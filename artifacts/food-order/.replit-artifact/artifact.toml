kind = "web"
previewPath = "/"
title = "Food Ordering Website"
version = "1.0.0"
id = "artifacts/food-order"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23357

[services.development]
run = "pnpm --filter @workspace/food-order run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/food-order", "run", "build" ]
publicDir = "artifacts/food-order/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23357"
BASE_PATH = "/"
